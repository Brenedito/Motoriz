version: '3.8'

services:
  # 1. Banco de Dados (MySQL)
  db:
    image: mysql:8
    container_name: motoriz_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysqldata:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - app-network

  # 2. Backend (Spring Boot) — sem portas expostas externamente
  backend:
    build: ./backend
    container_name: motoriz_backend
    environment:
      DB_HOST: db
      DB_PORT: 3306
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
    depends_on:
      - db
    networks:
      - app-network

  # 3. Frontend (React Native)
  frontend:
    build: ./frontend
    container_name: motoriz_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

  mobile:
    build: ./mobile
    container_name: motoriz_mobile
    ports:
      - "8081:8081"
    volumes:
      - ./mobile/MotorizApp:/app
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  mysqldata:

networks:
  app-network:
    driver: bridge
